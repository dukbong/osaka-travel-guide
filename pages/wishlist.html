---
layout: default
title: "위시리스트"
description: "관심 있는 오사카 여행 상품을 모아보세요."
permalink: /wishlist/
---

<div class="wishlist-page">
  <div class="wishlist-header">
    <h1>위시리스트</h1>
    <button class="btn-cta btn-cta-primary" id="addAllToPlanner" style="display:none;">일정에 모두 추가</button>
  </div>

  <div id="wishlistEmpty" class="empty-state">
    <div class="empty-icon">&#9825;</div>
    <h2>위시리스트가 비어있습니다</h2>
    <p>마음에 드는 상품의 하트 버튼을 눌러 위시리스트에 추가해보세요.</p>
    <a href="{{ '/' | relative_url }}" class="btn-cta btn-cta-primary">상품 둘러보기</a>
  </div>

  <div class="product-grid" id="wishlistGrid" style="display:none;"></div>
</div>

<script>
window.PRODUCTS = {{ site.data.products.products | jsonify }};
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var products = window.PRODUCTS;
  var grid = document.getElementById('wishlistGrid');
  var emptyState = document.getElementById('wishlistEmpty');
  var addAllBtn = document.getElementById('addAllToPlanner');
  var baseUrl = '{{ site.baseurl }}';

  function getWishlist() {
    return JSON.parse(localStorage.getItem('osakaWishlist') || '[]');
  }

  function renderWishlist() {
    var wishlist = getWishlist();
    if (wishlist.length === 0) {
      grid.style.display = 'none';
      emptyState.style.display = '';
      addAllBtn.style.display = 'none';
      return;
    }

    grid.style.display = '';
    emptyState.style.display = 'none';
    addAllBtn.style.display = '';
    grid.textContent = '';

    wishlist.forEach(function(pid) {
      var p = products.find(function(pr) { return pr.id === pid; });
      if (!p) return;

      var card = document.createElement('div');
      card.className = 'product-card';

      // Image section
      var imgLink = document.createElement('a');
      imgLink.className = 'product-card-link';
      imgLink.href = baseUrl + '/products/' + p.slug + '/';
      var imgWrap = document.createElement('div');
      imgWrap.className = 'product-card-image';
      var img = document.createElement('img');
      img.src = p.image;
      img.alt = p.name;
      img.loading = 'lazy';
      imgWrap.appendChild(img);
      if (p.discountRate && p.discountRate > 0) {
        var db = document.createElement('span');
        db.className = 'card-discount-badge';
        db.textContent = p.discountText;
        imgWrap.appendChild(db);
      }
      imgLink.appendChild(imgWrap);
      card.appendChild(imgLink);

      // Body
      var body = document.createElement('div');
      body.className = 'product-card-body';

      var catSpan = document.createElement('span');
      catSpan.className = 'card-category';
      catSpan.textContent = p.category;
      body.appendChild(catSpan);

      var titleLink = document.createElement('a');
      titleLink.className = 'product-card-link';
      titleLink.href = baseUrl + '/products/' + p.slug + '/';
      var title = document.createElement('h3');
      title.className = 'card-title';
      title.textContent = p.name;
      titleLink.appendChild(title);
      body.appendChild(titleLink);

      var ratingDiv = document.createElement('div');
      ratingDiv.className = 'card-rating';
      var starSpan = document.createElement('span');
      starSpan.className = 'card-stars';
      starSpan.textContent = '\u2605';
      ratingDiv.appendChild(starSpan);
      ratingDiv.appendChild(document.createTextNode(' '));
      var rvSpan = document.createElement('span');
      rvSpan.className = 'card-rating-value';
      rvSpan.textContent = String(p.rating);
      ratingDiv.appendChild(rvSpan);
      ratingDiv.appendChild(document.createTextNode(' '));
      var rcSpan = document.createElement('span');
      rcSpan.className = 'card-review-count';
      rcSpan.textContent = '(' + (p.reviewCount || 0) + ')';
      ratingDiv.appendChild(rcSpan);
      body.appendChild(ratingDiv);

      var priceDiv = document.createElement('div');
      priceDiv.className = 'card-price';
      if (p.originalPrice !== p.salePrice) {
        var op = document.createElement('span');
        op.className = 'card-original-price';
        op.textContent = p.originalPrice.toLocaleString() + '\uc6d0';
        priceDiv.appendChild(op);
      }
      var sp = document.createElement('span');
      sp.className = 'card-sale-price';
      sp.textContent = p.salePrice.toLocaleString() + '\uc6d0';
      priceDiv.appendChild(sp);
      body.appendChild(priceDiv);
      card.appendChild(body);

      // Actions - using innerHTML only for static SVG icons (no user data)
      var actions = document.createElement('div');
      actions.className = 'product-card-actions';

      var wishBtn = document.createElement('button');
      wishBtn.className = 'btn-wishlist wishlisted';
      wishBtn.dataset.productId = p.id;
      wishBtn.title = '\uc704\uc2dc\ub9ac\uc2a4\ud2b8\uc5d0\uc11c \uc81c\uac70';
      wishBtn.innerHTML = '<svg class="heart-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      actions.appendChild(wishBtn);

      var planBtn = document.createElement('button');
      planBtn.className = 'btn-add-planner';
      planBtn.dataset.productId = p.id;
      planBtn.title = '\uc77c\uc815\uc5d0 \ucd94\uac00';
      planBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>';
      actions.appendChild(planBtn);
      card.appendChild(actions);

      // Event listeners
      wishBtn.addEventListener('click', function() {
        var wl = getWishlist().filter(function(id) { return id !== p.id; });
        localStorage.setItem('osakaWishlist', JSON.stringify(wl));
        renderWishlist();
        if (window.App) window.App.updateWishlistCount();
      });

      planBtn.addEventListener('click', function() {
        var planner = JSON.parse(localStorage.getItem('osakaPlanner') || '{"1":[],"2":[],"3":[]}');
        planner['1'].push(p.id);
        localStorage.setItem('osakaPlanner', JSON.stringify(planner));
        alert(p.name + ' Day 1\uc5d0 \ucd94\uac00\ub418\uc5c8\uc2b5\ub2c8\ub2e4.');
      });

      grid.appendChild(card);
    });
  }

  addAllBtn.addEventListener('click', function() {
    var wishlist = getWishlist();
    if (wishlist.length === 0) return;
    var planner = JSON.parse(localStorage.getItem('osakaPlanner') || '{"1":[],"2":[],"3":[]}');
    wishlist.forEach(function(pid) {
      planner['1'].push(pid);
    });
    localStorage.setItem('osakaPlanner', JSON.stringify(planner));
    alert('\ubaa8\ub4e0 \uc704\uc2dc\ub9ac\uc2a4\ud2b8 \uc0c1\ud488\uc774 Day 1\uc5d0 \ucd94\uac00\ub418\uc5c8\uc2b5\ub2c8\ub2e4.');
  });

  renderWishlist();
});
</script>
